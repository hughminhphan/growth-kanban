<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090a;
    --surface: #111214;
    --surface-raised: #181a1e;
    --border: #232529;
    --border-hover: #3a3d42;
    --text: #f0f0f0;
    --text-secondary: #94969a;
    --text-dim: #5c5e63;
    --accent: #e8c468;
    --accent-dim: rgba(232,196,104,0.08);
    --red: #ff6b6b;
    --red-glow: rgba(255,107,107,0.06);
    --amber: #f0b952;
    --amber-glow: rgba(240,185,82,0.06);
    --emerald: #4ade80;
    --emerald-glow: rgba(74,222,128,0.06);
    --blue: #6ea8fe;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  header {
    padding: 32px 40px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .logo-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  .logo h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
  }

  /* ── Filters ── */
  .filters {
    padding: 20px 40px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 8px;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filter-btn:hover {
    color: var(--text-secondary);
    border-color: var(--border-hover);
    background: var(--surface);
  }

  .filter-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin: 0 40px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .column {
    background: var(--surface);
    min-height: calc(100vh - 200px);
  }

  .column-header {
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  .column-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .column-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .column-cards {
    padding: 0 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface-raised);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }

  .card.expanded .card-notes { display: block; }

  .card.moving {
    animation: slideOut 0.3s ease-out forwards;
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(30px) scale(0.98); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  /* ── Checkbox ── */
  .card-check {
    appearance: none;
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    border: 1.5px solid var(--border-hover);
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s ease;
    position: relative;
    background: transparent;
  }

  .card-check:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .card-check:checked {
    background: var(--emerald);
    border-color: var(--emerald);
  }

  .card-check:checked::after {
    content: "\2713";
    position: absolute;
    top: -1px;
    left: 2px;
    font-size: 10px;
    color: #08090a;
    font-weight: 700;
  }

  .card-check.is-done {
    pointer-events: none;
    opacity: 0.3;
  }

  .card-title {
    font-size: 13px;
    font-weight: 450;
    line-height: 1.45;
    flex: 1;
    color: var(--text);
  }

  .card-action {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .card:hover .card-action { opacity: 1; }

  .card-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  /* ── Tags ── */
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
  }

  .tag-p1 { color: var(--red); background: var(--red-glow); border: 1px solid rgba(255,107,107,0.15); }
  .tag-p2 { color: var(--amber); background: var(--amber-glow); border: 1px solid rgba(240,185,82,0.15); }
  .tag-p3 { color: var(--emerald); background: var(--emerald-glow); border: 1px solid rgba(74,222,128,0.15); }

  .assignee-tag {
    font-size: 11px;
    color: var(--text-dim);
  }

  .due-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--red);
    letter-spacing: 0.5px;
  }

  .done-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ── Card Notes ── */
  .card-notes {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  .card-notes p { margin-bottom: 8px; }

  .card-notes a {
    color: var(--accent);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  .card-notes a:hover { text-decoration: underline; }

  .card-notes .quote {
    border-left: 2px solid var(--accent);
    padding-left: 10px;
    margin: 8px 0;
    font-style: italic;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ── Done column ── */
  .column.col-done .card {
    opacity: 0.45;
  }
  .column.col-done .card:hover {
    opacity: 0.75;
  }

  /* ── Footer stats ── */
  .footer {
    padding: 20px 40px 40px;
    display: flex;
    gap: 32px;
  }

  .stat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat strong {
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .board {
      grid-template-columns: 1fr;
      margin: 0 16px;
    }
    header { padding: 20px 16px 0; flex-direction: column; align-items: flex-start; gap: 12px; }
    .filters { padding: 16px; }
    .column { min-height: auto; }
    .footer { padding: 20px 16px; }
  }
</style>
</head>

const LAST_UPDATED = "2026-03-13 15:11 AEDT";
let activeFilter = "all";

function getFiltered(status) {
  return TASKS.filter(t => {
    if (t.status !== status) return false;
    if (activeFilter === "all") return true;
    if (["hugh","duke","annsley"].includes(activeFilter)) return t.assignee === activeFilter;
    if (activeFilter === "p1") return t.priority === 1;
    if (activeFilter === "p2") return t.priority === 2;
    if (activeFilter === "p3") return t.priority === 3;
    return true;
  }).sort((a,b) => a.priority - b.priority);
}

    { key:"todo", label:"To Do", tasks:todo, cls:"" },
    { key:"in_progress", label:"In Progress", tasks:inProg, cls:"" },
    { key:"done", label:"Done", tasks:done, cls:"col-done" }
  ];

  document.getElementById("board").innerHTML = cols.map(col => `
    <div class="column ${col.cls}">
      <div class="column-header">
        <span class="column-label">${col.label}</span>
        <span class="column-count">${col.tasks.length}</span>
      </div>
      <div class="column-cards">
        ${col.tasks.map(t => renderCard(t)).join("")}
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.classList.contains("card-check")) return;
      card.classList.toggle("expanded");
    });
  });

  const p1 = TASKS.filter(t=>t.status!=="done"&&t.priority===1).length;
  const p2 = TASKS.filter(t=>t.status!=="done"&&t.priority===2).length;
  const p3 = TASKS.filter(t=>t.status!=="done"&&t.priority===3).length;
  document.getElementById("footerStats").innerHTML = `<strong>${p1}</strong> P1 \u00b7 <strong>${p2}</strong> P2 \u00b7 <strong>${p3}</strong> P3 \u00b7 <strong>${done.length}</strong> Done (30d)`;
}

function renderCard(t) {
  const isDone = t.status === "done";
  const pClass = `tag-p${t.priority}`;
  const name = t.assignee.charAt(0).toUpperCase() + t.assignee.slice(1);
  const actionLabel = t.status === "todo" ? "START \u2192" : t.status === "in_progress" ? "DONE \u2192" : "";

  let notes = "";
  if (t.notes) notes += `<p>${esc(t.notes)}</p>`;
  if (t.quotes?.length) notes += t.quotes.map(q=>`<div class="quote">${esc(q)}</div>`).join("");
  if (t.link) notes += `<p><a href="${t.link}" target="_blank">View in Slack \u2192</a> ${t.channel||""}</p>`;

  return `
    <div class="card" data-id="${t.id}">
      <div class="card-top">
        <input type="checkbox" class="card-check ${isDone?'is-done':''}" ${isDone?'checked disabled':''} onclick="event.stopPropagation();advanceTask('${t.id}')">
        <div class="card-title">${esc(t.title)}</div>
        ${actionLabel?`<span class="card-action">${actionLabel}</span>`:''}
      </div>
      <div class="card-meta">
        <span class="tag ${pClass}">P${t.priority}</span>
        <span class="assignee-tag">@${name}</span>
        ${t.due?`<span class="due-tag">${t.due}</span>`:''}
        ${t.done?`<span class="done-date">${t.done}</span>`:''}
      </div>
      ${notes?`<div class="card-notes">${notes}</div>`:''}
    </div>`;
}

function advanceTask(id) {
  const t = TASKS.find(x=>x.id===id);
  if (!t) return;
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (el) el.classList.add("moving");
  setTimeout(()=>{
    if (t.status==="todo") t.status="in_progress";
    else if (t.status==="in_progress") { t.status="done"; t.done=new Date().toLocaleDateString("en-AU",{month:"short",day:"numeric"}); }
    renderBoard();
  },300);
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter=btn.dataset.filter;
    renderBoard();
  });
});

renderBoard();
</script>
</body>
</html>
