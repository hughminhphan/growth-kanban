<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Team Command Center</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --red: #f85149;
    --red-bg: rgba(248,81,73,0.12);
    --yellow: #d29922;
    --yellow-bg: rgba(210,153,34,0.12);
    --green: #3fb950;
    --green-bg: rgba(63,185,80,0.12);
    --blue: #58a6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header { padding:20px 32px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:20px; font-weight:600; }
  header .meta { color:var(--text-muted); font-size:13px; }

  .filters { padding:12px 32px; display:flex; gap:8px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-muted); padding:4px 12px; border-radius:20px; cursor:pointer; font-size:12px; transition:all 0.15s; }
  .filter-btn:hover, .filter-btn.active { color:var(--text); border-color:var(--blue); background:rgba(88,166,255,0.1); }

  .board { display:flex; gap:16px; padding:20px 32px; overflow-x:auto; min-height:calc(100vh - 120px); align-items:flex-start; }

  .column { min-width:320px; max-width:360px; flex:1; background:var(--surface); border-radius:8px; border:1px solid var(--border); }
  .column-header { padding:12px 16px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .column-header .count { background:var(--border); color:var(--text-muted); font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }
  .column-cards { padding:8px; display:flex; flex-direction:column; gap:6px; max-height:calc(100vh - 200px); overflow-y:auto; }

  .card { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; cursor:pointer; transition:all 0.15s; }
  .card:hover { border-color:var(--text-muted); }
  .card.expanded .card-notes { display:block; }
  .card.moving { animation:slideOut 0.3s ease-out; opacity:0; transform:translateX(40px); }
  @keyframes slideOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(40px); } }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .card-title { font-size:13px; font-weight:500; line-height:1.4; flex:1; }

  .card-checkbox { appearance:none; -webkit-appearance:none; width:16px; height:16px; border:1.5px solid var(--border); border-radius:3px; cursor:pointer; flex-shrink:0; margin-top:1px; transition:all 0.15s; position:relative; }
  .card-checkbox:hover { border-color:var(--blue); background:rgba(88,166,255,0.1); }
  .card-checkbox:checked { background:var(--green); border-color:var(--green); }
  .card-checkbox:checked::after { content:"\2713"; position:absolute; top:-1px; left:2px; font-size:11px; color:white; }
  .card-checkbox.done-check { pointer-events:none; opacity:0.4; }
  .card-checkbox.done-check:checked { background:var(--green); border-color:var(--green); opacity:0.4; }
  .card-meta { display:flex; gap:6px; align-items:center; margin-top:8px; flex-wrap:wrap; }

  .tag { font-size:10px; font-weight:600; padding:2px 6px; border-radius:3px; letter-spacing:0.5px; }
  .tag-p1 { color:var(--red); background:var(--red-bg); }
  .tag-p2 { color:var(--yellow); background:var(--yellow-bg); }
  .tag-p3 { color:var(--green); background:var(--green-bg); }

  .assignee { font-size:11px; color:var(--text-muted); background:var(--surface); padding:2px 8px; border-radius:10px; }
  .due { font-size:11px; color:var(--red); }

  .card-notes { display:none; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:12px; color:var(--text-muted); line-height:1.6; }
  .card-notes p { margin-bottom:6px; }
  .card-notes a { color:var(--blue); text-decoration:none; }
  .card-notes a:hover { text-decoration:underline; }
  .card-notes .quote { border-left:2px solid var(--border); padding-left:8px; margin:6px 0; font-style:italic; font-size:11px; }

  .expand-icon { color:var(--text-muted); font-size:10px; flex-shrink:0; margin-top:2px; }

  .column.done .card { opacity:0.6; }
  .column.done .card:hover { opacity:1; }

  .stats { display:flex; gap:16px; padding:0 32px; margin-bottom:0; }
  .stat { font-size:12px; color:var(--text-muted); }
  .stat strong { color:var(--text); }

  @media (max-width: 768px) {
    .board { flex-direction:column; padding:12px; }
    .column { min-width:100%; max-width:100%; }
    header { padding:16px; }
    .filters { padding:8px 16px; }
  }
</style>
</head>

const LAST_UPDATED = "2026-03-13 15:11 AEDT";

let activeFilter = "all";

function renderBoard() {
  const board = document.getElementById("board");
  document.getElementById("lastUpdated").textContent = LAST_UPDATED;

  const columns = [
    { key: "todo", label: "To Do", icon: "\u{1F4CB}" },
    { key: "in_progress", label: "In Progress", icon: "\u26A1" },
    { key: "done", label: "Done", icon: "\u2705", className: "done" }
  ];

  board.innerHTML = columns.map(col => {
    const tasks = TASKS.filter(t => {
      if (t.status !== col.key) return false;
      if (activeFilter === "all") return true;
      if (["hugh","duke","annsley"].includes(activeFilter)) return t.assignee === activeFilter;
      if (activeFilter === "p1") return t.priority === 1;
      if (activeFilter === "p2") return t.priority === 2;
      if (activeFilter === "p3") return t.priority === 3;
      return true;
    }).sort((a,b) => a.priority - b.priority);

    return `
      <div class="column ${col.className || ''}">
        <div class="column-header">
          ${col.icon} ${col.label}
          <span class="count">${tasks.length}</span>
        </div>
        <div class="column-cards">
          ${tasks.map(t => renderCard(t, col.key)).join("")}
        </div>
      </div>
    `;
  }).join("");

  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => card.classList.toggle("expanded"));
  });
}

function renderCard(t, colKey) {
  const pClass = `tag-p${t.priority}`;
  const pLabel = `P${t.priority}`;
  const assigneeLabel = t.assignee.charAt(0).toUpperCase() + t.assignee.slice(1);

  let notesHtml = "";
  if (t.notes) notesHtml += `<p>${escapeHtml(t.notes)}</p>`;
  if (t.quotes && t.quotes.length > 0) {
    notesHtml += t.quotes.map(q => `<div class="quote">${escapeHtml(q)}</div>`).join("");
  }
  if (t.link) {
    notesHtml += `<p><a href="${t.link}" target="_blank">View in Slack \u2192</a> ${t.channel || ""}</p>`;
  }

  const isDone = t.status === "done";
  const checkClass = isDone ? "card-checkbox done-check" : "card-checkbox";
  const checked = isDone ? "checked" : "";
  const nextLabel = t.status === "todo" ? "Start" : t.status === "in_progress" ? "Done" : "";

  return `
    <div class="card" data-id="${t.id}">
      <div class="card-top">
        ${!isDone ? `<input type="checkbox" class="${checkClass}" ${checked} data-task-id="${t.id}" title="${nextLabel}" onclick="event.stopPropagation(); advanceTask('${t.id}')">` : `<input type="checkbox" class="${checkClass}" checked disabled>`}
        <div class="card-title">${escapeHtml(t.title)}</div>
        ${notesHtml ? '<div class="expand-icon">\u25BC</div>' : ''}
      </div>
      <div class="card-meta">
        <span class="tag ${pClass}">${pLabel}</span>
        <span class="assignee">@${assigneeLabel}</span>
        ${t.due ? `<span class="due">\u{1F4C5} ${t.due}</span>` : ""}
        ${t.done ? `<span class="assignee">\u2713 ${t.done}</span>` : ""}
        ${nextLabel ? `<span class="assignee" style="color:var(--blue);">\u2192 ${nextLabel}</span>` : ""}
      </div>
      ${notesHtml ? `<div class="card-notes">${notesHtml}</div>` : ""}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function advanceTask(taskId) {
  const task = TASKS.find(t => t.id === taskId);
  if (!task) return;

  const card = document.querySelector(`.card[data-id="${taskId}"]`);
  if (card) card.classList.add("moving");

  setTimeout(() => {
    if (task.status === "todo") {
      task.status = "in_progress";
    } else if (task.status === "in_progress") {
      task.status = "done";
      task.done = new Date().toLocaleDateString("en-AU", { month:"short", day:"numeric" });
    }
    renderBoard();
  }, 300);
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderBoard();
  });
});

renderBoard();
</script>
